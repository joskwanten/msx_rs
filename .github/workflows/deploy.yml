name: Deploy WASM build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for the modern Pages-from-Actions deploy flow.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy when a new commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install binaryen (provides wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build WASM bundle
        # The public-url path must match the URL the site is served from.
        # For project repo `joskwanten/msx_rs` that's /msx_rs/.
        # For a user-site repo (`username.github.io`) use "/" instead.
        run: trunk build --release --public-url /msx_rs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
