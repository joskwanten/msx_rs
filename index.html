<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>MSX.rs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        canvas {
            /* `position: fixed` + 100%/100% beats any default styling winit
               (or the browser) might attach to the auto-created canvas. */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* `image-rendering: pixelated` keeps the chunky retro look when
               the shader's integer scale + the browser scale combine. */
            image-rendering: pixelated;
            outline: none;
        }
    </style>
    <!-- Trunk replaces this with the compiled WASM + loader.
         wasm-opt version is pinned to a recent Binaryen via Trunk.toml
         (see [tools] there). That version auto-preserves reference-types
         and bulk-memory, so `-Oz` is safe again. -->
    <link data-trunk rel="rust" data-bin="msx_rs" data-wasm-opt="z" />
    <!-- Ship the system ROMs (NMS8245 set for ?bios=, optional fmpac.rom)
         and the game library so ?rom= / ?bios= / ?disk= URLs resolve.
         C-BIOS and the MSX-MUSIC fallback are compiled into the wasm and
         don't need these; only the real-machine extras live here. -->
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="copy-dir" href="games" />
</head>
<body>
</body>
</html>
